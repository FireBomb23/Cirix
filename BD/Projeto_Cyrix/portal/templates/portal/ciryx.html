<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciryx Cybersecurity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #EAB308;
    --yellow-light: #FEF08A;
    --yellow-dark: #A16207;
    --slate-900: #0F172A;
    --slate-800: #1E293B;
    --slate-700: #334155;
    --slate-600: #475569;
    --slate-400: #94A3B8;
    --slate-300: #CBD5E1;
    --slate-200: #E2E8F0;
    --slate-100: #F1F5F9;
    --slate-50: #F8FAFC;
    --green: #22C55E;
    --red: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background-color: var(--slate-900); color: var(--slate-100); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  h1, h2, h3, .font-syne { font-family: 'Syne', sans-serif; font-weight: 700; }
  a { color: inherit; text-decoration: none; }
  
  /* UTILS */
  .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .align-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .flex-1 { flex: 1; }
  .grid { display: grid; gap: 1.5rem; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .text-center { text-center: center; }
  
  /* HEADER */
  .header { background-color: rgba(15, 23, 42, 0.8); border-bottom: 1px solid var(--slate-800); position: sticky; top: 0; backdrop-filter: blur(8px); z-index: 100; padding: 1rem 0; }
  .logo { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.05em; color: var(--yellow); }
  .logo span { color: var(--slate-100); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-item { cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: color 0.2s; color: var(--slate-400); }
  .nav-item:hover, .nav-item.active { color: var(--yellow); }
  
  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; font-weight: 600; font-size: 0.95rem; border-radius: 0.375rem; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background-color: var(--yellow); color: var(--slate-900); }
  .btn-primary:hover { background-color: #F59E0B; transform: translateY(-1px); }
  .btn-outline { background-color: transparent; color: var(--slate-100); border: 1px solid var(--slate-700); }
  .btn-outline:hover { background-color: var(--slate-800); border-color: var(--slate-400); }
  .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }
  
  /* FOOTER */
  .footer { background-color: #0B0F19; border-top: 1px solid var(--slate-800); padding: 2rem 0; font-size: 0.875rem; color: var(--slate-400); text-align: center; margin-top: auto; }
  
  /* INPUTS */
  .input { width: 100%; padding: 0.75rem 1rem; background-color: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 0.375rem; color: var(--slate-100); font-size: 0.95rem; transition: border-color 0.2s; }
  .input:focus { outline: none; border-color: var(--yellow); }
  
  /* HOME */
  .hero { padding: 5rem 0; text-align: center; max-width: 800px; margin: 0 auto; }
  .hero h1 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
  .hero p { font-size: 1.125rem; color: var(--slate-400); margin-bottom: 2rem; line-height: 1.6; }
  .hero-buttons { display: flex; gap: 1rem; justify-content: center; }
  .feature-card { background-color: var(--slate-800); border: 1px solid var(--slate-700); padding: 2rem; border-radius: 0.5rem; }
  .feature-icon { width: 3rem; height: 3rem; border-radius: 0.375rem; background-color: rgba(234, 179, 8, 0.1); color: var(--yellow); display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .feature-card h3 { margin-bottom: 0.75rem; font-size: 1.25rem; }
  .feature-card p { color: var(--slate-400); font-size: 0.95rem; line-height: 1.5; }
  
  /* PAGES CONTAINER */
  .page-view { padding: 3rem 0; }
  .page-title { font-size: 2.25rem; margin-bottom: 1rem; }
  .page-subtitle { color: var(--slate-400); margin-bottom: 2.5rem; font-size: 1.05rem; }
  
  /* TEAM */
  .team-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .team-card { background-color: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 0.5rem; overflow: hidden; text-align: center; }
  .team-img { width: 100%; height: 200px; background-color: var(--slate-700); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--slate-400); }
  .team-info { padding: 1.25rem; }
  .team-role { font-size: 0.85rem; color: var(--yellow); text-transform: uppercase; font-weight: 600; margin-top: 0.25rem; }
  
  /* NEWS */
  .news-card { background-color: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column; }
  .news-img { height: 180px; background-color: var(--slate-700); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--slate-400); }
  .news-content { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
  .news-meta { font-size: 0.8rem; color: var(--slate-400); margin-bottom: 0.5rem; }
  .news-title { font-size: 1.25rem; margin-bottom: 0.75rem; line-height: 1.3; }
  .news-desc { color: var(--slate-400); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.25rem; }
  
  /* FORMS */
  .form-container { max-width: 500px; margin: 0 auto; background-color: var(--slate-800); border: 1px solid var(--slate-700); padding: 2.5rem; border-radius: 0.5rem; }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--slate-300); }
  
  /* DASHBOARD CONTAINER */
  .dashboard-layout { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; min-height: 500px; }
  .sidebar { border-right: 1px solid var(--slate-800); padding-right: 1.5rem; }
  .sidebar-menu { display: flex; flex-direction: column; gap: 0.5rem; }
  .sidebar-item { padding: 0.75rem 1rem; border-radius: 0.375rem; font-weight: 500; font-size: 0.95rem; cursor: pointer; color: var(--slate-400); transition: all 0.2s; }
  .sidebar-item:hover, .sidebar-item.active { background-color: var(--slate-800); color: var(--slate-50); }
  .sidebar-item.active { border-left: 3px solid var(--yellow); border-radius: 0 0.375rem 0.375rem 0; }
  
  /* METRIC CARDS */
  .metric-card { background-color: var(--slate-800); border: 1px solid var(--slate-700); padding: 1.5rem; border-radius: 0.5rem; }
  .metric-label { font-size: 0.85rem; color: var(--slate-400); font-weight: 500; text-transform: uppercase; margin-bottom: 0.25rem; }
  .metric-value { font-size: 2rem; font-weight: 700; color: var(--slate-50); }
  
  /* TABLES */
  .table-wrapper { background-color: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 0.5rem; overflow: hidden; }
  .table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
  .table th { background-color: rgba(15, 23, 42, 0.4); padding: 1rem; font-weight: 600; color: var(--slate-300); border-bottom: 1px solid var(--slate-700); }
  .table td { padding: 1rem; border-bottom: 1px solid var(--slate-700); color: var(--slate-200); }
  .table tr:last-child td { border-bottom: none; }
  
  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
  .badge-success { background-color: rgba(34, 197, 94, 0.1); color: var(--green); }
  .badge-warning { background-color: rgba(234, 179, 8, 0.1); color: var(--yellow); }
  .badge-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--red); }
  
  /* TOAST */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background-color: var(--slate-800); border-left: 4px solid var(--yellow); padding: 1rem 1.5rem; border-radius: 0.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 0.75rem; z-index: 1000; transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  .toast.show { transform: translateY(0); }
  
  /* COMPLIANCE BARS */
  .bar-container { background-color: var(--slate-700); height: 0.5rem; border-radius: 9999px; overflow: hidden; width: 100px; }
  .bar-fill { height: 100%; background-color: var(--yellow); }
  
  /* CHAT COMPONENT */
  .chat-box { background-color: var(--slate-800); border: 1px solid var(--slate-700); border-radius: 0.5rem; display: flex; flex-direction: column; height: 400px; }
  .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
  .chat-msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.95rem; line-height: 1.4; }
  .chat-msg-in { background-color: var(--slate-700); color: var(--slate-100); align-self: flex-start; }
  .chat-msg-out { background-color: rgba(234, 179, 8, 0.15); color: var(--yellow-light); align-self: flex-end; border: 1px solid rgba(234, 179, 8, 0.3); }
  .msg-meta { font-size: 0.75rem; color: var(--slate-400); margin-top: 0.25rem; text-align: right; }
  .ticket-reply { padding: 1rem; border-top: 1px solid var(--slate-700); display: flex; gap: 0.75rem; }
</style>
</head>
<body>

  <header class="header">
    <div class="container flex align-center justify-between">
      <div class="logo" onclick="navigate('home')" style="cursor:pointer">Ciryx<span>.</span></div>
      <nav class="nav-links" id="navLinks"></nav>
    </div>
  </header>

  <main class="flex-1 container page-view" id="app"></main>

  <footer class="footer">
    <div class="container">
      &copy; 2026 Ciryx Cybersecurity. Todos os direitos reservados. Projeto Académico Multimédia - ESTGV.
    </div>
  </footer>

  <div class="toast" id="toast">
    <span id="toastIcon"></span>
    <span id="toastText"></span>
  </div>

  <script>
    // ============================================================
    // INJEÇÃO DE DADOS DINÂMICOS DO DJANGO (FICHA 9)
    // ============================================================
    const dbData = {
      conformidade: {% if dashboard_nis2 %}{{ dashboard_nis2|safe }}{% else %}[]{% endif %},
      incidentes: {% if dashboard_top5 %}{{ dashboard_top5|safe }}{% else %}[]{% endif %},
      documentos: {% if dashboard_docs %}{{ dashboard_docs|safe }}{% else %}[]{% endif %},
      perfis:  {% if dashboard_perfis %}{{ dashboard_perfis|safe }}{% else %}[]{% endif %},
      tickets:  {% if dashboard_tickets %}{{ dashboard_tickets|safe }}{% else %}[]{% endif %}
    };

    // ESTADO DA APLICAÇÃO SPA
    const state = {
      currentPage: 'home',
      currentAdminTab: 'compliance',
      user: null
    };

    // INLINE FEATHER ICONS REPLACEMENT
    function icn(name) {
      const icons = {
        shield: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
        activity: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
        users: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        fileText: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
        lock: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
        send: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
        check: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        alert: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      };
      return icons[name] || '';
    }

    // TOAST NOTIFIER
    function toast(text, type='success') {
      const t = document.getElementById('toast');
      document.getElementById('toastText').innerText = text;
      document.getElementById('toastIcon').innerHTML = type === 'success' ? icn('check') : icn('alert');
      t.style.borderLeftColor = type === 'success' ? 'var(--green)' : 'var(--red)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // NAVEGAÇÃO SPA
    function navigate(page) {
      state.currentPage = page;
      renderNav();
      render();
      window.scrollTo(0,0);
    }

    function setAdminTab(tab) {
      state.currentAdminTab = tab;
      render();
    }

    function logout() {
      state.user = null;
      toast('Sessão terminada com sucesso.');
      navigate('home');
    }

    // ATUALIZAÇÃO DO MENU SUPERIOR
    function renderNav() {
      const nav = document.getElementById('navLinks');
      const items = [
        { id: 'home', label: 'Início' },
        { id: 'about', label: 'Sobre Nós' },
        { id: 'services', label: 'Serviços' },
        { id: 'news', label: 'Artigos' },
        { id: 'contact', label: 'Contacto' }
      ];
      
      let html = items.map(i => `<span class="nav-item ${state.currentPage === i.id ? 'active' : ''}" onclick="navigate('${i.id}')">${i.label}</span>`).join('');
      
      if (!state.user) {
        html += `<button class="btn btn-primary btn-sm" onclick="navigate('login')"><span>${icn('lock')}</span> Área Restrita</button>`;
      } else {
        const dash = state.user.perfil === 'Cliente' ? 'client-dashboard' : 'admin-dashboard';
        html += `
          <span class="nav-item ${state.currentPage === dash ? 'active' : ''}" onclick="navigate('${dash}')">Dashboard</span>
          <button class="btn btn-outline btn-sm" onclick="logout()">Sair (${state.user.nome})</button>
        `;
      }
      nav.innerHTML = html;
    }

    // FRONTEND RENDERS (PÁGINAS PÚBLICAS)
    function renderHome() {
      return `
        <div class="hero">
          <h1>Resiliência Cibernética e Conformidade Avançada</h1>
          <p>A Ciryx oferece consultoria especializada em auditoria de segurança de informação, garantindo que a sua organização cumpre integralmente os requisitos das diretivas NIS2.</p>
          <div class="hero-buttons">
            <button class="btn btn-primary" onclick="navigate('contact')">Agendar Auditoria</button>
            <button class="btn btn-outline" onclick="navigate('services')">Ver Serviços</button>
          </div>
        </div>
        <div class="grid grid-3">
          <div class="feature-card">
            <div class="feature-icon">${icn('shield')}</div>
            <h3>Adequação NIS2</h3>
            <p>Apoio na reestruturação legal e técnica exigida pela nova diretiva europeia de segurança.</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">${icn('activity')}</div>
            <h3>Análise de Risco</h3>
            <p>Varreduras completas e testes de intrusão mapeando fraquezas nos servidores da empresa.</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">${icn('users')}</div>
            <h3>Formação de Equipas</h3>
            <p>Treinos práticos focados em mitigar ataques de Engenharia Social e Phishing.</p>
          </div>
        </div>`;
    }

    function renderAbout() {
      return `
        <h2 class="page-title">Sobre Nós</h2>
        <p class="page-subtitle">Conheça a equipa de especialistas seniores por trás das nossas auditorias.</p>
        <div class="grid team-grid">
          <div class="team-card">
            <div class="team-img">👨‍💻</div>
            <div class="team-info"><h3>Eng. Carlos Mendes</h3><div class="team-role">Diretor de Operações / CISO</div></div>
          </div>
          <div class="team-card">
            <div class="team-img">👩‍💻</div>
            <div class="team-info"><h3>Dra. Ana Rita Rocha</h3><div class="team-role">Especialista em Direito Digital</div></div>
          </div>
          <div class="team-card">
            <div class="team-img">🛡️</div>
            <div class="team-info"><h3>Dr. Bruno Antunes</h3><div class="team-role">Analista de Pentest Sénior</div></div>
          </div>
        </div>`;
    }

    function renderServices() {
      return `
        <h2 class="page-title">Nossos Serviços</h2>
        <p class="page-subtitle">Soluções modulares para proteção e governança empresarial de dados.</p>
        <div class="grid grid-3">
          <div class="feature-card"><h3>Gap Analysis NIS2</h3><p style="margin-top:0.5rem;color:var(--slate-400)">Auditoria inicial de processos e produção de relatório de conformidade legal.</p></div>
          <div class="feature-card"><h3>Monitorização SecOps</h3><p style="margin-top:0.5rem;color:var(--slate-400)">Vigilância contínua contra intrusões com equipa SOC ativa 24 horas por dia.</p></div>
          <div class="feature-card"><h3>Resposta a Incidentes</h3><p style="margin-top:0.5rem;color:var(--slate-400)">Plano de contingência imediato focado em mitigar ataques de Ransomware ativos.</p></div>
        </div>`;
    }

    function renderNews() {
      return `
        <h2 class="page-title">Artigos e Alertas</h2>
        <p class="page-subtitle">Fique por dentro das últimas tendências globais de ameaças virtuais.</p>
        <div class="grid grid-3">
          <div class="news-card">
            <div class="news-img">📰</div>
            <div class="news-content">
              <div class="news-meta">02 Junho, 2026 • Segurança</div>
              <h3 class="news-title">Os impactos práticos das coimas NIS2 nas PME portuguesas</h3>
              <p class="news-desc">Análise profunda sobre o quadro sancionatório que entra em vigor este ano.</p>
            </div>
          </div>
          <div class="news-card">
            <div class="news-img">🔒</div>
            <div class="news-content">
              <div class="news-meta">28 Maio, 2026 • Tecnologia</div>
              <h3 class="news-title">Como implementar Zero Trust sem quebrar a produtividade</h3>
              <p class="news-desc">Boas práticas para arquiteturas modernas de autenticação de utilizadores.</p>
            </div>
          </div>
        </div>`;
    }

    function renderContact() {
      return `
        <h2 class="page-title text-center">Fale Connosco</h2>
        <p class="page-subtitle text-center">Solicite o contacto de um auditor técnico preenchendo o formulário.</p>
        <div class="form-container">
          <form id="contactForm" onsubmit="handleContact(event)">
            <div class="form-group"><label>Nome Completo</label><input class="input" id="c_name" required placeholder="Ex: Catarina Silva"></div>
            <div class="form-group"><label>E-mail Corporativo</label><input class="input" type="email" id="c_email" required placeholder="empresa@dominio.com"></div>
            <div class="form-group"><label>Mensagem</label><textarea class="input" id="c_msg" rows="4" required placeholder="Como podemos ajudar a sua organização?"></textarea></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Enviar Pedido</button>
          </form>
        </div>`;
    }

    function renderLogin() {
      return `
        <h2 class="page-title text-center">Acesso ao Sistema</h2>
        <p class="page-subtitle text-center">Introduza as credenciais fornecidas no contrato de suporte.</p>
        <div class="form-container">
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group"><label>Endereço de E-mail</label><input class="input" type="email" id="l_email" required placeholder="utilizador@ciryx.pt"></div>
            <div class="form-group"><label>Palavra-passe</label><input class="input" type="password" id="l_pass" required placeholder="••••••••"></div>
            <button type="submit" class="btn btn-primary" style="width:100%">Autenticar</button>
          </form>
        </div>`;
    }

    // CLIENT DASHBOARD (GET SIMULADO)
    function renderClientDashboard() {
      return `
        <div class="dashboard-layout">
          <div class="sidebar">
            <h3 style="margin-bottom:1.5rem;color:var(--yellow)">Portal Cliente</h3>
            <div class="sidebar-menu">
              <div class="sidebar-item active">Visão Geral</div>
            </div>
          </div>
          <div class="flex-col" style="gap:2rem">
            <div><h2>Bem-vindo, ${state.user.nome}</h2><p style="color:var(--slate-400)">Estado contratual e suporte técnico ativo.</p></div>
            <div class="grid grid-3">
              <div class="metric-card"><div class="metric-label">Estado NIS2</div><div class="metric-value" style="color:var(--green)">Conforme</div></div>
              <div class="metric-card"><div class="metric-label">Tickets Abertos</div><div class="metric-value">1</div></div>
              <div class="metric-card"><div class="metric-label">Documentos Válidos</div><div class="metric-value">14</div></div>
            </div>
            <div class="chat-box">
              <div style="padding:1rem;border-bottom:1px solid var(--slate-700);font-weight:600">Suporte Dedicado: Ticket #2041</div>
              <div class="chat-messages">
                <div class="chat-msg chat-msg-in">Olá. Analisámos o vosso plano e falta anexar o mapeamento de ativos externos.<div class="msg-meta">Auditor Ciryx • 09:30</div></div>
                <div class="chat-msg chat-msg-out">Entendido. Vamos fazer o upload do PDF na pasta partilhada até ao final da tarde.<div class="msg-meta">${state.user.nome} • 10:15</div></div>
              </div>
              <div class="ticket-reply">
                <input class="input flex-1" id="msgInput" placeholder="Escreva uma mensagem...">
                <button class="btn btn-primary btn-sm" onclick="toast('Mensagem enviada com sucesso!')"><span>${icn('send')}</span> Enviar</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    // ============================================================
    // ADMIN DASHBOARD (EXIBIÇÃO REAL DOS CRITÉRIOS DA FICHA 9)
    // ============================================================
    function renderAdminDashboard() {
      const t = state.currentAdminTab;
      
      let mainContent = '';
      if (t === 'compliance') {
        // EXERCÍCIO 1 DA FICHA 9
        let rows = dbData.conformidade.map(item => `
          <tr>
            <td><strong>${item.estado_nis2 || 'Desconhecido'}</strong></td>
            <td><span class="badge badge-warning">${item.total} Organizações</span></td>
          </tr>
        `).join('');
        if(dbData.conformidade.length === 0) rows = `<tr><td colspan="2" class="text-center">Sem dados de conformidade na BD.</td></tr>`;

        mainContent = `
          <h3>1. Estado de Conformidade NIS2 Geral</h3>
          <p style="color:var(--slate-400);margin-bottom:1rem">Contagem de clientes agregados pelo seu nível de adequação legal.</p>
          <div class="table-wrapper"><table class="table"><thead><tr><th>Estado NIS2</th><th>Total de Clientes</th></tr></thead><tbody>${rows}</tbody></table></div>`;
          
      } else if (t === 'incidentes') {
        // EXERCÍCIO 2 DA FICHA 9
        let rows = dbData.incidentes.map((item, index) => `
          <tr>
            <td>${index + 1}</td>
            <td><strong>${item.nome}</strong></td>
            <td><span class="badge badge-danger">${item.total_incidentes} Incidentes</span></td>
          </tr>
        `).join('');
        if(dbData.incidentes.length === 0) rows = `<tr><td colspan="3" class="text-center">Sem incidentes registados no pgAdmin.</td></tr>`;

        mainContent = `
          <h3>2. Top 5 Clientes com Mais Incidentes</h3>
          <p style="color:var(--slate-400);margin-bottom:1rem">Identificação crítica baseada nas tabelas relacionais de segurança.</p>
          <div class="table-wrapper"><table class="table"><thead><tr><th>Posição</th><th>Cliente</th><th>Total Registado</th></tr></thead><tbody>${rows}</tbody></table></div>`;
          
      } else if (t === 'documentos') {
        // EXERCÍCIO 3 DA FICHA 9
        let rows = dbData.documentos.map(item => `
          <tr>
            <td>${item.cliente}</td>
            <td><span class="badge badge-success">${item.mes}</span></td>
            <td><strong>${item.total_documentos} submissões</strong></td>
          </tr>
        `).join('');
        if(dbData.documentos.length === 0) rows = `<tr><td colspan="3" class="text-center">Sem documentos arquivados.</td></tr>`;

        mainContent = `
          <h3>3. Documentos Submetidos por Cliente / Mês</h3>
          <p style="color:var(--slate-400);margin-bottom:1rem">Histórico mensal de auditoria e carregamento de evidências organizacionais.</p>
          <div class="table-wrapper"><table class="table"><thead><tr><th>Cliente</th><th>Mês de Referência</th><th>Volume</th></tr></thead><tbody>${rows}</tbody></table></div>`;
          
      } else if (t === 'perfis') {
        // EXERCÍCIO 4 DA FICHA 9
        let rows = dbData.perfis.map(item => `
          <tr>
            <td><strong>${item.perfil}</strong></td>
            <td>${item.total} utilizadores</td>
          </tr>
        `).join('');
        if(dbData.perfis.length === 0) rows = `<tr><td colspan="2" class="text-center">Sem utilizadores encontrados.</td></tr>`;

        mainContent = `
          <h3>4. Distribuição de Utilizadores por Perfil</h3>
          <p style="color:var(--slate-400);margin-bottom:1rem">Segregação de privilégios de acesso atuais.</p>
          <div class="table-wrapper"><table class="table"><thead><tr><th>Perfil Técnico</th><th>Contagem</th></tr></thead><tbody>${rows}</tbody></table></div>`;
          
      } else if (t === 'tickets') {
        // EXERCÍCIO 5 DA FICHA 9
        let rows = dbData.tickets.map(item => `
          <tr>
            <td><span class="badge badge-warning">${item.estado}</span></td>
            <td><strong>${item.total_tickets} pedidos</strong></td>
            <td>${item.tempo_medio_resolucao ? item.tempo_medio_resolucao + ' dias' : 'N/A'}</td>
          </tr>
        `).join('');
        if(dbData.tickets.length === 0) rows = `<tr><td colspan="3" class="text-center">Nenhum ticket aberto no suporte.</td></tr>`;

        mainContent = `
          <h3>5. Estado de Métrica dos Tickets e Resolução</h3>
          <p style="color:var(--slate-400);margin-bottom:1rem">Tempo médio calculado diretamente com funções agregadas no PostgreSQL.</p>
          <div class="table-wrapper"><table class="table"><thead><tr><th>Estado</th><th>Total de Pedidos</th><th>Tempo Médio de Resolução</th></tr></thead><tbody>${rows}</tbody></table></div>`;
      }

      return `
        <div class="dashboard-layout">
          <div class="sidebar">
            <h3 style="margin-bottom:1.5rem;color:var(--yellow)">Painel de Controlo</h3>
            <div class="sidebar-menu">
              <div class="sidebar-item ${t === 'compliance' ? 'active' : ''}" onclick="setAdminTab('compliance')">1. Estados NIS2</div>
              <div class="sidebar-item ${t === 'incidentes' ? 'active' : ''}" onclick="setAdminTab('incidentes')">2. Top 5 Incidentes</div>
              <div class="sidebar-item ${t === 'documentos' ? 'active' : ''}" onclick="setAdminTab('documentos')">3. Documentação</div>
              <div class="sidebar-item ${t === 'perfis' ? 'active' : ''}" onclick="setAdminTab('perfis')">4. Perfis de Sistema</div>
              <div class="sidebar-item ${t === 'tickets' ? 'active' : ''}" onclick="setAdminTab('tickets')">5. SLA de Tickets</div>
            </div>
          </div>
          <div class="flex-col" style="gap:1.5rem">
            <div><h2>Consola Administrativa - Relatório Ficha 9</h2><p style="color:var(--slate-400)">Dados analíticos extraídos de funções ativas em <code>basededados.py</code>.</p></div>
            ${mainContent}
          </div>
        </div>`;
    }

    // ============================================================
    // PROCESSAMENTO DE SUBMISSÕES POST (CONEXÃO AJAX AO DJANGO)
    // ============================================================
    function handleContact(e) {
      e.preventDefault();
      const payload = {
        action: 'contacto',
        name: document.getElementById('c_name').value,
        email: document.getElementById('c_email').value,
        message: document.getElementById('c_msg').value
      };

      fetch('', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          toast('Obrigado! Mensagem de contacto gravada no PostgreSQL.');
          document.getElementById('contactForm').reset();
        } else {
          toast('Falha ao registar dados na tabela.', 'error');
        }
      })
      .catch(() => toast('Erro de comunicação de rede.', 'error'));
    }

    function handleLogin(e) {
      e.preventDefault();
      const payload = {
        action: 'login',
        email: document.getElementById('l_email').value,
        password: document.getElementById('l_pass').value
      };

      fetch('', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          state.user = data.user;
          toast(`Autenticado com perfil: ${state.user.perfil}`);
          if(state.user.perfil === 'Cliente') {
            navigate('client-dashboard');
          } else {
            navigate('admin-dashboard');
          }
        } else {
          toast(data.message || 'Credenciais rejeitadas pelo sistema.', 'error');
        }
      })
      .catch(() => toast('Erro interno do servidor Django.', 'error'));
    }

    // INICIALIZAÇÃO SPA
    function render() {
      const app = document.getElementById('app');
      const p = state.currentPage;
      if (p === 'home') app.innerHTML = renderHome();
      else if (p === 'about') app.innerHTML = renderAbout();
      else if (p === 'services') app.innerHTML = renderServices();
      else if (p === 'news') app.innerHTML = renderNews();
      else if (p === 'contact') app.innerHTML = renderContact();
      else if (p === 'login') app.innerHTML = renderLogin();
      else if (p === 'client-dashboard') {
        if (!state.user || state.user.perfil !== 'Cliente') { navigate('login'); return; }
        app.innerHTML = renderClientDashboard();
      }
      else if (p === 'admin-dashboard') {
        if (!state.user || state.user.perfil === 'Cliente') { navigate('login'); return; }
        app.innerHTML = renderAdminDashboard();
      }
    }

    // Arranque inicial do ecrã
    renderNav();
    render();
  </script>
</body>
</html>
