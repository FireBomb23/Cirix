<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciryx Cybersecurity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #EAB308;
    --yellow-light: #FEF08A;
    --yellow-dark: #A16207;
    --slate-900: #0F172A;
    --slate-800: #1E293B;
    --slate-700: #334155;
    --slate-600: #475569;
    --slate-400: #94A3B8;
    --slate-300: #CBD5E1;
    --slate-200: #E2E8F0;
    --slate-100: #F1F5F9;
    --slate-50: #F8FAFC;
    --green: #16A34A;
    --red: #DC2626;
    --orange: #EA580C;
    --blue: #2563EB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; color: var(--slate-800); background: #fff; line-height: 1.6; }
  h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; line-height: 1.2; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; }
  input, textarea, select { font-family: inherit; outline: none; }
  /* UTILS */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
  .hidden { display: none !important; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 0.5rem; }
  .gap-4 { gap: 1rem; }
  .gap-6 { gap: 1.5rem; }
  .gap-8 { gap: 2rem; }
  .grid { display: grid; }
  .text-center { text-align: center; }
  .w-full { width: 100%; }
  .mt-2 { margin-top: 0.5rem; }
  .mt-4 { margin-top: 1rem; }
  .mt-6 { margin-top: 1.5rem; }
  .mt-8 { margin-top: 2rem; }
  .mb-2 { margin-bottom: 0.5rem; }
  .mb-4 { margin-bottom: 1rem; }
  .mb-6 { margin-bottom: 1.5rem; }
  .mb-8 { margin-bottom: 2rem; }
  .p-4 { padding: 1rem; }
  .p-6 { padding: 1.5rem; }
  .p-8 { padding: 2rem; }
  .rounded { border-radius: 0.5rem; }
  .rounded-lg { border-radius: 0.75rem; }
  .rounded-full { border-radius: 9999px; }
  .shadow { box-shadow: 0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06); }
  .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05); }
  .shadow-xl { box-shadow: 0 20px 25px -5px rgba(0,0,0,.1),0 10px 10px -5px rgba(0,0,0,.04); }
  .text-sm { font-size: 0.875rem; }
  .text-xs { font-size: 0.75rem; }
  .text-lg { font-size: 1.125rem; }
  .text-xl { font-size: 1.25rem; }
  .text-2xl { font-size: 1.5rem; }
  .text-3xl { font-size: 1.875rem; }
  .text-4xl { font-size: 2.25rem; }
  .font-semibold { font-weight: 600; }
  .font-bold { font-weight: 700; }
  .italic { font-style: italic; }
  .overflow-hidden { overflow: hidden; }
  .relative { position: relative; }
  .absolute { position: absolute; }
  .inset-0 { top:0;right:0;bottom:0;left:0; }
  .z-10 { z-index: 10; }
  .z-50 { z-index: 50; }
  .sticky { position: sticky; top: 0; }
  .min-h-screen { min-height: 100vh; }
  .flex-col { flex-direction: column; }
  .flex-1 { flex: 1; }
  .flex-wrap { flex-wrap: wrap; }
  .flex-shrink-0 { flex-shrink: 0; }
  .object-cover { object-fit: cover; }
  .border-t { border-top: 1px solid var(--slate-200); }
  .border-b { border-bottom: 1px solid; }
  .opacity-20 { opacity: 0.2; }
  .transition { transition: all 0.2s; }
  .cursor-pointer { cursor: pointer; }
  /* NAV */
  nav { background: var(--slate-900); color: white; border-bottom: 1px solid var(--slate-800); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 4rem; }
  .nav-logo { display: flex; align-items: center; gap: 0.625rem; }
  .nav-logo svg { color: var(--yellow); }
  .nav-logo-text { display: flex; flex-direction: column; }
  .nav-logo-brand { font-family:'Syne',sans-serif; font-weight: 700; font-size: 1.125rem; line-height: 1.2; }
  .nav-logo-sub { font-size: 0.7rem; color: var(--slate-400); }
  .nav-links { display: flex; align-items: center; gap: 1.5rem; }
  .nav-link { font-size: 0.875rem; color: var(--slate-300); transition: color 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--yellow); }
  .nav-hamburger { display: none; background: none; color: white; padding: 0.5rem; border-radius: 0.375rem; }
  .nav-hamburger:hover { background: var(--slate-800); }
  .nav-mobile { display: none; padding: 1rem 0; border-top: 1px solid var(--slate-800); }
  .nav-mobile a { display: block; padding: 0.625rem 1rem; border-radius: 0.375rem; color: var(--slate-300); font-size: 0.875rem; transition: all 0.2s; }
  .nav-mobile a:hover, .nav-mobile a.active { background: var(--slate-800); color: var(--yellow); }
  .nav-mobile-actions { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--slate-800); display: flex; flex-direction: column; gap: 0.5rem; padding-left: 1rem; padding-right: 1rem; }
   /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
  .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8rem; }
  .btn-lg { padding: 0.75rem 1.5rem; font-size: 1rem; }
  .btn-primary { background: var(--yellow); color: var(--slate-900); }
  .btn-primary:hover { background: #CA9A04; }
  .btn-outline { background: transparent; border: 1px solid var(--slate-600); color: white; }
  .btn-outline:hover { background: var(--slate-800); }
  .btn-outline-dark { background: transparent; border: 1px solid var(--slate-300); color: var(--slate-700); }
  .btn-outline-dark:hover { background: var(--slate-100); }
  .btn-ghost { background: transparent; color: var(--slate-400); }
  .btn-ghost:hover { color: white; }
  .btn-white { background: white; color: var(--yellow-dark); }
  .btn-white:hover { background: #FFFBEB; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #B91C1C; }
  .btn-success { background: var(--green); color: white; }
  /* CARDS */
  .card { background: white; border: 1px solid var(--slate-200); border-radius: 0.75rem; transition: box-shadow 0.2s; }
  .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1); }
  .card-content { padding: 1.5rem; }
  /* INPUTS */
  .input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--slate-300); border-radius: 0.5rem; font-size: 0.875rem; background: white; transition: border-color 0.2s; }
  .input:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(234,179,8,0.1); }
  .label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; color: var(--slate-700); }
  textarea.input { resize: vertical; min-height: 120px; }
  /* BADGE */
  .badge { display: inline-flex; align-items: center; padding: 0.2rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .badge-yellow { background: #FEF9C3; color: var(--yellow-dark); }
  .badge-green { background: #DCFCE7; color: #166534; }
  .badge-red { background: #FEE2E2; color: #991B1B; }
  .badge-blue { background: #DBEAFE; color: #1E40AF; }
  .badge-gray { background: var(--slate-100); color: var(--slate-600); }
  .badge-orange { background: #FFEDD5; color: #9A3412; }
  /* ALERT */
  .alert { padding: 0.875rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; display: flex; align-items: flex-start; gap: 0.625rem; }
  .alert-error { background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }
  .alert-success { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }
  .alert-info { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1D4ED8; }
  .alert-warning { background: #FFFBEB; border: 1px solid #FDE68A; color: #92400E; }
  /* TOAST */
  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
  .toast-item { background: var(--slate-900); color: white; padding: 0.875rem 1.25rem; border-radius: 0.75rem; font-size: 0.875rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,.3); animation: slideIn 0.3s ease; border-left: 3px solid var(--yellow); max-width: 320px; }
  .toast-item.error { border-left-color: var(--red); }
  .toast-item.success { border-left-color: var(--green); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  /* SECTIONS */
  .section { padding: 5rem 0; }
  .section-sm { padding: 3rem 0; }
  .section-bg { background: var(--slate-50); }
  /* HERO */
  .hero { position: relative; background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 50%, var(--slate-900) 100%); color: white; padding: 5rem 0 6rem; }
  .hero-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1693314184947-af516631ff1d?w=1080&q=60') center/cover no-repeat; opacity: 0.15; }
  .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 1.5rem; }
  .hero h1 span { color: var(--yellow); }
  .hero p { color: var(--slate-300); font-size: 1.2rem; max-width: 600px; margin-bottom: 2rem; }
  .hero-inner { position: relative; z-index: 10; }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 1rem; }
  .hero-stats { display: flex; flex-wrap: wrap; gap: 2rem; margin-top: 3rem; }
  .hero-stat { display: flex; flex-direction: column; }
  .hero-stat-num { font-family: 'Syne',sans-serif; font-size: 2rem; font-weight: 800; color: var(--yellow); }
  .hero-stat-label { font-size: 0.875rem; color: var(--slate-400); }
  /* PAGE HERO */
  .page-hero { background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800)); color: white; padding: 4rem 0; }
  .page-hero h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.75rem; }
  .page-hero p { color: var(--slate-300); font-size: 1.1rem; max-width: 600px; }
  /* SERVICES GRID */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
  .service-icon { width: 3rem; height: 3rem; background: #FEF9C3; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
  .service-icon svg { color: var(--yellow-dark); }
  .service-feature { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--slate-600); margin-bottom: 0.375rem; }
  .service-feature svg { color: var(--green); flex-shrink: 0; }
  /* WHY US */
  .why-item { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
  .why-icon { width: 2.5rem; height: 2.5rem; background: #FEF9C3; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  /* ARTICLES */
  .articles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
  .article-img { height: 12rem; background: linear-gradient(135deg, var(--yellow), #A16207); display: flex; align-items: center; justify-content: center; }
  /* CTA SECTION */
  .cta-section { background: linear-gradient(135deg, var(--yellow), #A16207); color: white; padding: 5rem 0; text-align: center; }
  .cta-section h2 { font-size: 2.5rem; margin-bottom: 1rem; }
  .cta-section p { color: #FEF9C3; font-size: 1.1rem; max-width: 600px; margin: 0 auto 2rem; }
  /* FOOTER */
  footer { background: var(--slate-900); color: var(--slate-300); padding: 3rem 0 1.5rem; }
  .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
  .footer-heading { color: white; font-weight: 600; margin-bottom: 1rem; }
  .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.875rem; }
  .footer-links a:hover { color: var(--yellow); }
  .footer-contact-item { display: flex; align-items: flex-start; gap: 0.625rem; font-size: 0.875rem; margin-bottom: 0.75rem; }
  .footer-contact-item svg { color: var(--yellow); flex-shrink: 0; margin-top: 2px; }
  .footer-bottom { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--slate-800); text-align: center; font-size: 0.875rem; color: var(--slate-500); }
   /* LOGIN */
  .login-page { min-height: 100vh; background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 50%, var(--slate-900) 100%); display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-box { width: 100%; max-width: 440px; }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo a { display: inline-flex; align-items: center; gap: 0.75rem; color: white; }
  .login-card { background: white; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
  .login-card-header { padding: 2rem 2rem 1rem; text-align: center; border-bottom: 1px solid var(--slate-100); }
  .login-card-header h2 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .login-card-header p { font-size: 0.875rem; color: var(--slate-500); }
  .login-card-body { padding: 1.5rem 2rem 2rem; }
  .login-demo { background: var(--slate-50); border-radius: 0.5rem; padding: 1rem; margin-top: 1.5rem; }
  .login-demo-title { font-size: 0.75rem; font-weight: 600; color: var(--slate-600); margin-bottom: 0.75rem; }
  .login-demo-user { padding-bottom: 0.75rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--slate-200); }
  .login-demo-user:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .login-demo-user strong { color: var(--slate-800); }
  .login-demo-2fa { font-size: 0.7rem; color: var(--slate-500); margin-top: 0.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* DASHBOARD LAYOUT */
  .dash-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: var(--slate-900); color: white; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform 0.3s; overflow-y: auto; }
  .sidebar-logo { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--slate-800); display: flex; align-items: center; gap: 0.625rem; }
  .sidebar-logo-text { font-family: 'Syne',sans-serif; font-weight: 700; }
  .sidebar-logo-sub { font-size: 0.65rem; color: var(--slate-400); }
  .sidebar-user { padding: 1rem 1.5rem; border-bottom: 1px solid var(--slate-800); }
  .sidebar-user-name { font-weight: 600; font-size: 0.875rem; }
  .sidebar-user-role { font-size: 0.75rem; color: var(--slate-400); }
  .sidebar-nav { padding: 1rem 0; flex: 1; }
  .sidebar-section { padding: 0.25rem 1rem 0.5rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--slate-500); font-weight: 600; margin-top: 0.5rem; }
  .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1.5rem; font-size: 0.875rem; color: var(--slate-400); transition: all 0.2s; }
  .sidebar-link:hover { background: var(--slate-800); color: white; }
  .sidebar-link.active { background: rgba(234,179,8,0.15); color: var(--yellow); border-right: 2px solid var(--yellow); }
  .sidebar-link svg { flex-shrink: 0; }
  .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--slate-800); }
  .dash-main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .dash-topbar { background: white; border-bottom: 1px solid var(--slate-200); padding: 0 1.5rem; height: 4rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
  .dash-topbar-title { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 1.125rem; }
  .dash-content { padding: 2rem 1.5rem; flex: 1; background: var(--slate-50); }
  .dash-hamburger { display: none; background: none; padding: 0.5rem; border-radius: 0.375rem; color: var(--slate-600); }
  .dash-hamburger:hover { background: var(--slate-100); }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

  /* STAT CARDS */
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .stat-card { background: white; border: 1px solid var(--slate-200); border-radius: 0.75rem; padding: 1.5rem; }
  .stat-card-label { font-size: 0.875rem; color: var(--slate-500); margin-bottom: 0.5rem; }
  .stat-card-value { font-family: 'Syne',sans-serif; font-size: 2rem; font-weight: 700; color: var(--slate-900); }
  .stat-card-change { font-size: 0.75rem; color: var(--green); margin-top: 0.25rem; }

  /* TABLE */
  .table-wrap { background: white; border: 1px solid var(--slate-200); border-radius: 0.75rem; overflow: hidden; }
  .table-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  .table-header h3 { font-family: 'Syne',sans-serif; font-weight: 700; font-size: 1rem; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 0.75rem 1.5rem; font-size: 0.75rem; font-weight: 600; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.05em; background: var(--slate-50); border-bottom: 1px solid var(--slate-200); }
  td { padding: 1rem 1.5rem; font-size: 0.875rem; border-bottom: 1px solid var(--slate-100); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--slate-50); }
  .table-scroll { overflow-x: auto; }

  /* PROCESS STEPS */
  .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; }
  .step-num { width: 4rem; height: 4rem; background: var(--yellow); color: var(--slate-900); font-family: 'Syne',sans-serif; font-size: 1.5rem; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }

  /* CONTACT */
  .contact-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
  .contact-icon { width: 4rem; height: 4rem; background: #FEF9C3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .contact-icon svg { color: var(--yellow-dark); }
  .contact-map { background: var(--slate-200); border-radius: 0.75rem; height: 24rem; display: flex; align-items: center; justify-content: center; }

  /* ABOUT */
  .mvv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
  .mvv-icon { width: 4rem; height: 4rem; background: #FEF9C3; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
  .team-avatar { width: 5rem; height: 5rem; border-radius: 50%; background: linear-gradient(135deg, var(--yellow), var(--yellow-dark)); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-family: 'Syne',sans-serif; font-size: 1.5rem; font-weight: 700; color: white; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: white; border-radius: 0.75rem; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,.5); }
  .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-family: 'Syne',sans-serif; font-weight: 700; }
  .modal-body { padding: 1.5rem; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--slate-200); display: flex; justify-content: flex-end; gap: 0.75rem; }

  /* TICKET DETAIL */
  .ticket-detail { background: white; border-radius: 0.75rem; border: 1px solid var(--slate-200); overflow: hidden; }
  .ticket-detail-header { padding: 1.5rem; border-bottom: 1px solid var(--slate-200); }
  .ticket-messages { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; }
  .msg-bubble { padding: 0.875rem 1rem; border-radius: 0.75rem; max-width: 85%; }
  .msg-bubble.admin { background: var(--yellow-light); align-self: flex-start; }
  .msg-bubble.client { background: var(--slate-100); align-self: flex-end; }
  .msg-meta { font-size: 0.7rem; color: var(--slate-500); margin-top: 0.25rem; }
  .ticket-reply { padding: 1.5rem; border-top: 1px solid var(--slate-200); display: flex; gap: 0.75rem; }

  /* PROGRESS BAR */

function icn(name, cls='') {
  const s = icon[name] || icon.shield;
  if (!cls) return s;
  return s.replace('<svg ', `<svg class="${cls}" `);
}

function navigate(page, sub=null) {
  state.currentPage = page;
  if (sub) state.sidebarPage = sub;
  else state.sidebarPage = page;
  render();
  window.scrollTo(0,0);
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  t.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('pt-PT', {day:'numeric',month:'long',year:'numeric'});
}

function statusBadge(s) {
  const map = {
    'pending': ['badge-gray', 'Pendente'],
    'in-progress': ['badge-blue', 'Em Progresso'],
    'completed': ['badge-green', 'Concluído'],
    'open': ['badge-yellow', 'Aberto'],
    'resolved': ['badge-green', 'Resolvido'],
    'closed': ['badge-gray', 'Fechado'],
    'overdue': ['badge-red', 'Atrasado'],
    'revoked': ['badge-red', 'Revogado'],
  };
  const [cls, label] = map[s] || ['badge-gray', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

function priorityBadge(p) {
  const map = {
    'low': ['badge-green', 'Baixa'],
    'medium': ['badge-yellow', 'Média'],
    'high': ['badge-orange', 'Alta'],
    'urgent': ['badge-red', 'Urgente'],
  };
  const [cls, label] = map[p] || ['badge-gray', p];
  return `<span class="badge ${cls}">${label}</span>`;
}

  const authBtn = state.user
    ? `<a href="#" onclick="navigate('${state.user.role==='client'?'client-dashboard':'admin-dashboard'}');return false"><button class="btn btn-sm btn-outline">${state.user.role==='client'?'Área Cliente':'Dashboard'}</button></a>

    <div class="container">

        <a href="#" class="nav-logo" onclick="navigate('home');return false">
          <span class="icon-lg yellow">${icn('shield')}</span>

function toggleMobileMenu() {
  const m = document.getElementById('mobileMenu');

}

function submitLogin() {
  const email = document.getElementById('lemail').value.trim();
  const pass = document.getElementById('lpassword').value;
  const err = document.getElementById('loginError');
  const user = mockUsers.find(u => u.email === email && u.password === pass);
  if (user) {
    state.loginEmail = email;
    state.loginStep = '2fa';
    err.style.display = 'none';
    render();
  } else {
    err.textContent = 'Email ou password incorretos. Tente novamente.';
    err.style.display = 'flex';
  }
}

function submit2FA() {
  const w1 = (document.getElementById('word1').value || '').toLowerCase().trim();
  const w2 = (document.getElementById('word2').value || '').toLowerCase().trim();
  const err = document.getElementById('loginError');
  const user = mockUsers.find(u => u.email === state.loginEmail);
  if (user && w1 !== w2 && user.twoFAWords.includes(w1) && user.twoFAWords.includes(w2)) {
    state.user = {id:user.id,name:user.name,email:user.email,role:user.role,company:user.company};
    localStorage.setItem('ciryxUser', JSON.stringify(state.user));
    state.loginStep = 'credentials';
    state.loginEmail = '';
    toast(`Bem-vindo/a, ${user.name}!`);
    navigate(user.role === 'client' ? 'client-dashboard' : 'admin-dashboard');
  } else {
    err.textContent = 'Palavras de verificação incorretas. Tente novamente.';
    err.style.display = 'flex';
  }
}

function logout() {
  state.user = null;
  localStorage.removeItem('ciryxUser');
  toast('Sessão terminada.','');
  navigate('home');
}

            <input class="input flex-1" id="reply-${t.id}" placeholder="Escreva uma resposta...">

function openNewTicketModal() { document.getElementById('newTicketModal').style.display='flex'; }
function submitTicket() {
  const title = document.getElementById('tickTitle').value;
  const desc = document.getElementById('tickDesc').value;
  const cat = document.getElementById('tickCat').value;
  const prio = document.getElementById('tickPrio').value;
  if (!title || !desc) { toast('Preencha todos os campos.','error'); return; }
  const t = {id:'t'+Date.now(),clientId:state.user.id,clientName:state.user.name,title,description:desc,category:cat,priority:prio,status:'open',createdAt:new Date().toISOString(),comments:[{id:'c'+Date.now(),userId:state.user.id,userName:state.user.name,userRole:'client',content:desc,timestamp:new Date().toISOString()}]};
  state.tickets.unshift(t);
  document.getElementById('newTicketModal').style.display='none';
  toast('Ticket criado com sucesso!');
  render();
}

function addTicketReply(ticketId) {
  const input = document.getElementById('reply-'+ticketId);
  const content = input?.value?.trim();
  if (!content) return;
  const ticket = state.tickets.find(t => t.id === ticketId);
  if (ticket) {
    ticket.comments.push({id:'c'+Date.now(),userId:state.user.id,userName:state.user.name,userRole:state.user.role,content,timestamp:new Date().toISOString()});
    toast('Resposta enviada!');
    render();
  }
}

function openNewArticleModal() { document.getElementById('newArticleModal').style.display='flex'; }
function submitArticle() {
  const t = document.getElementById('artTitle').value;
  const e = document.getElementById('artExcerpt').value;
  const a = document.getElementById('artAuthor').value;
  const c = document.getElementById('artCat').value;
  if (!t||!e) { toast('Preencha os campos obrigatórios.','error'); return; }
  state.articles.unshift({id:'art'+Date.now(),title:t,excerpt:e,author:a||state.user.name,date:new Date().toISOString().split('T')[0],category:c||'Geral',content:e});
  document.getElementById('newArticleModal').style.display='none';
  toast('Artigo publicado!');
  render();
}
function deleteArticle(id) {
  state.articles = state.articles.filter(a=>a.id!==id);
  toast('Artigo apagado.');
  render();
}

            ${t.comments.map(c=>`<div><div class="msg-bubble ${c.userRole==='client'?'client':'admin'}">${c.content}</div><div class="msg-meta" style="text-align:${c.userRole==='client'?'right':'left'}">${c.userName} • ${new Date(c.timestamp).toLocaleString('pt-PT')}</div></div>`).join('')}

function addTicketReply(ticketId, inputId) {
  const input = document.getElementById(inputId||'reply-'+ticketId);
  const content = input?.value?.trim();
  if (!content) return;
  const ticket = state.tickets.find(t => t.id === ticketId);
  if (ticket) {
    ticket.comments.push({id:'c'+Date.now(),userId:state.user.id,userName:state.user.name,userRole:state.user.role,content,timestamp:new Date().toISOString()});
    toast('Resposta enviada!');
    render();
  }
}
function resolveTicket(id) {
  const t = state.tickets.find(t=>t.id===id);
  if (t) { t.status='resolved'; toast('Ticket resolvido!'); render(); }
}

// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  const p = state.currentPage;
  if (p === 'home') app.innerHTML = renderHome();
  else if (p === 'about') app.innerHTML = renderAbout();
  else if (p === 'services') app.innerHTML = renderServices();
  else if (p === 'news') app.innerHTML = renderNews();
  else if (p === 'contact') app.innerHTML = renderContact();
  else if (p === 'login') app.innerHTML = renderLogin();
  else if (p === 'client-dashboard') {
    if (!state.user || state.user.role !== 'client') { navigate('login'); return; }
    app.innerHTML = renderClientDashboard();
  }
  else if (p === 'admin-dashboard') {
    if (!state.user || state.user.role === 'client') { navigate('login'); return; }
    app.innerHTML = renderAdminDashboard();
  }
  else app.innerHTML = renderHome();
}

// Initial render
render();

// Handle browser back
window.addEventListener('popstate', () => { render(); });
</script>
